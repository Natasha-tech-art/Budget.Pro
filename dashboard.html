<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - BudgetPro</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 text-gray-800">

    <nav class="flex justify-between items-center px-8 py-4 bg-blue-900 text-white">
  <h1 class="text-2xl font-bold">BudgetPro</h1>

  <ul class="flex gap-6 items-center">
    <li><a href="index.html" class="hover:text-blue-300">Home</a></li>
    <li><a href="about.html" class="hover:text-blue-300">About Us</a></li>
    <li><a href="how-it-works.html" class="hover:text-blue-300">How It Works</a></li>
    <li><a href="pricing.html" class="hover:text-blue-300">Plans</a></li>
    <li><a href="learn.html" class="hover:text-blue-300">Learn</a></li>
    <li><a href="contact.html" class="hover:text-blue-300">Contact Us</a></li>
    <li><a href="login.html" class="hover:text-blue-300">Login</a></li>
    <li><a href="signup.html" class="hover:text-blue-300">Sign up</a></li>

    <li>
      <a href="dashboard.html"
         class="bg-white text-blue-900 px-4 py-2 rounded-lg font-semibold hover:bg-blue-100">
         Start budgeting
      </a>
    </li>
  </ul>
</nav>


<div class="p-6 max-w-5xl mx-auto">

  <div class="grid md:grid-cols-3 gap-6 mb-8">
    <div class="bg-white p-4 rounded shadow">
      <h3>Total Income</h3>
      <p id="income-total" class="text-green-600 text-xl">KES 0</p>
    </div>

    <div class="bg-white p-4 rounded shadow">
      <h3>Total Expenses</h3>
      <p id="expense-total" class="text-red-600 text-xl">KES 0</p>
    </div>

    <div class="bg-white p-4 rounded shadow">
      <h3>Balance</h3>
      <p id="balance" class="text-blue-600 text-xl">KES 0</p>
    </div>
  </div>

  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="font-bold mb-3">Add Income</h2>

    <input id="income-amount" type="number" placeholder="Amount"
      class="border p-2 rounded w-full mb-2">

    <input id="income-category" placeholder="Category (e.g Salary)"
      class="border p-2 rounded w-full mb-2">

    <input id="income-date" type="date"
      class="border p-2 rounded w-full mb-2">

    <button id="add-income"
      class="bg-blue-900 text-white px-4 py-2 rounded w-full">
      Add Income
    </button>
  </div>

  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="font-bold mb-3">Add Expense</h2>

    <input id="expense-name" placeholder="Expense Name"
      class="border p-2 rounded w-full mb-2">

    <input id="expense-amount" type="number" placeholder="Amount"
      class="border p-2 rounded w-full mb-2">

    <input id="expense-category" placeholder="Category (e.g Food)"
      class="border p-2 rounded w-full mb-2">

    <input id="expense-date" type="date"
      class="border p-2 rounded w-full mb-2">

    <button id="add-expense"
      class="bg-blue-900 text-white px-4 py-2 rounded w-full">
      Add Expense
    </button>
  </div>

  <div class="bg-white p-4 rounded shadow mb-6">
    <h2 class="font-bold mb-4">Transaction History</h2>
    <ul id="historyList" class="space-y-3"></ul>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <h2 class="font-bold mb-4">Expense Breakdown</h2>
    <canvas id="expenseChart"></canvas>
  </div>

</div>

<footer class="bg-blue-950 text-white text-center py-6">
  <p>© 2026 BudgetPro. All rights reserved.</p>
</footer>

<script>

document.addEventListener("DOMContentLoaded", function () {

  class Transaction {
    constructor(type, amount, category, date, name = "") {
      this.type = type;
      this.amount = amount;
      this.category = category;
      this.date = date;
      this.name = name;
    }
  }

  class BudgetManager {

    constructor() {
      this.transactions = JSON.parse(localStorage.getItem("transactions")) || [];

      this.incomeDisplay = document.getElementById("income-total");
      this.expenseDisplay = document.getElementById("expense-total");
      this.balanceDisplay = document.getElementById("balance");
      this.historyList = document.getElementById("historyList");

      this.chartCtx = document.getElementById("expenseChart").getContext("2d");
      this.chart = null;
    }

    addTransaction(transaction) {
      this.transactions.push(transaction);
      this.updateUI();
    }

    deleteTransaction(index) {
      this.transactions.splice(index, 1);
      this.updateUI();
    }

    updateUI() {
      let incomeTotal = 0;
      let expenseTotal = 0;
      let categoryTotals = {};

      this.historyList.innerHTML = "";

      this.transactions.forEach((t, index) => {

        if (t.type === "income") {
          incomeTotal += t.amount;
        } else {
          expenseTotal += t.amount;

          if (!categoryTotals[t.category]) {
            categoryTotals[t.category] = 0;
          }
          categoryTotals[t.category] += t.amount;
        }

        const li = document.createElement("li");
        li.className = "p-3 bg-gray-100 rounded flex justify-between";

        li.innerHTML = `
          <div>
            <p>${t.type === "income" ? "💰" : "💸"} 
            ${t.name || ""} KES ${t.amount}</p>
            <p class="text-sm text-gray-500">
              ${t.category} | ${t.date}
            </p>
          </div>
          <button data-index="${index}" class="delete-btn text-red-500">
            Delete
          </button>
        `;

        this.historyList.appendChild(li);
      });

      const balance = incomeTotal - expenseTotal;

      this.incomeDisplay.textContent = "KES " + incomeTotal.toFixed(2);
      this.expenseDisplay.textContent = "KES " + expenseTotal.toFixed(2);
      this.balanceDisplay.textContent = "KES " + balance.toFixed(2);

      localStorage.setItem("transactions", JSON.stringify(this.transactions));

      this.updateChart(categoryTotals);
      this.attachDeleteEvents();
    }

    updateChart(data) {
      const labels = Object.keys(data);
      const values = Object.values(data);

      if (this.chart) this.chart.destroy();

      this.chart = new Chart(this.chartCtx, {
        type: "pie",
        data: {
          labels: labels,
          datasets: [{ data: values }]
        }
      });
    }

    attachDeleteEvents() {
      document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const index = e.target.dataset.index;
          this.deleteTransaction(index);
        });
      });
    }

  }

  const app = new BudgetManager();

  document.getElementById("add-income").addEventListener("click", function () {

    const amount = parseFloat(document.getElementById("income-amount").value);
    const category = document.getElementById("income-category").value || "General";
    const date = document.getElementById("income-date").value || "No date";

    if (!amount) return;

    const income = new Transaction("income", amount, category, date);

    app.addTransaction(income);
  });

  document.getElementById("add-expense").addEventListener("click", function () {

    const name = document.getElementById("expense-name").value;
    const amount = parseFloat(document.getElementById("expense-amount").value);
    const category = document.getElementById("expense-category").value || "General";
    const date = document.getElementById("expense-date").value || "No date";

    if (!amount || !name) return;

    const expense = new Transaction("expense", amount, category, date, name);

    app.addTransaction(expense);
  });

  app.updateUI();

});

</script>
</body>
</html>
