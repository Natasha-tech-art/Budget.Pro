<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - BudgetPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800">

<nav class="flex justify-between items-center px-8 py-4 bg-blue-900 text-white">
  <h1 class="text-2xl font-bold">BudgetPro</h1>

  <ul class="flex gap-6 items-center">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="how-it-works.html">How It Works</a></li>
    <li><a href="pricing.html">Plans & Prices</a></li>
    <li><a href="learn.html">Learn</a></li>
    <li><a href="contact.html" class="text-blue-300">Contact Us</a></li>
    <li><a href="login.html">Login</a></li>
    <li>
      <a href="dashboard.html" class="bg-white text-blue-900 px-4 py-2 rounded-lg font-semibold">
        Start Budgeting
      </a>
    </li>
  </ul>
</nav>

<section class="relative h-[50vh] flex items-center justify-center text-center">

  <div class="absolute inset-0">
    <img src="https://images.unsplash.com/photo-1556745757-8d76bdb6984b"
         class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-blue-900 opacity-70"></div>
  </div>

  <div class="relative z-10 text-white px-6">
    <h1 class="text-4xl font-bold mb-4">Contact Us</h1>
    <p>We’d love to hear from you</p>
  </div>

</section>

<section class="py-16 px-8 md:px-20">

  <div class="max-w-2xl mx-auto bg-white shadow-lg rounded-lg p-8">

    <h2 class="text-2xl font-bold text-blue-900 mb-6 text-center">
      Send Us a Message
    </h2>

    <form id="contactForm" class="flex flex-col gap-4">

      <input type="text" id="name" placeholder="Your Name"
        class="border px-4 py-2 rounded">

      <input type="email" id="email" placeholder="Your Email"
        class="border px-4 py-2 rounded">

      <textarea id="message" placeholder="Your Message"
        class="border px-4 py-2 rounded h-32"></textarea>

      <button type="submit"
        class="bg-blue-900 text-white px-4 py-2 rounded hover:bg-blue-700">
        Send Message
      </button>

    </form>

    <p id="successMessage" class="text-green-600 mt-4 hidden text-center">
      Message sent successfully!
    </p>

  </div>

</section>

<footer class="bg-blue-950 text-white text-center py-6">
  <p>© 2026 BudgetPro</p>
</footer>

<script>

const form = document.getElementById("contactForm");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const messageInput = document.getElementById("message");
const successMessage = document.getElementById("successMessage");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const message = messageInput.value.trim();

  if (name === "" || email === "" || message === "") {
    alert("Please fill in all fields!");
    return;
  }

  if (!email.includes("@")) {
    alert("Please enter a valid email!");
    return;
  }

  successMessage.classList.remove("hidden");

  nameInput.value = "";
  emailInput.value = "";
  messageInput.value = "";
});

</script>

</body>
</html>
