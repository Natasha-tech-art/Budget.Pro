 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - BudgetPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800">

<nav class="flex justify-between items-center px-8 py-4 bg-blue-900 text-white">
  <h1 class="text-2xl font-bold">BudgetPro</h1>

  <ul class="flex gap-6 items-center">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="how-it-works.html">How It Works</a></li>
    <li><a href="pricing.html">Plans</a></li>
    <li><a href="learn.html">Learn</a></li>
    <li><a href="contact.html">Contact Us</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</nav>

<section class="min-h-screen flex items-center justify-center bg-blue-50">

  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">

    <h2 class="text-2xl font-bold text-blue-900 mb-6 text-center">
      Create an Account
    </h2>

    <form id="signupForm" class="flex flex-col gap-4">

      <input type="text" id="name"
        placeholder="Full Name"
        class="border px-4 py-2 rounded">

      <input type="email" id="email"
        placeholder="Email"
        class="border px-4 py-2 rounded">

      <div class="relative">
        <input type="password" id="password"
          placeholder="Password"
          class="border px-4 py-2 rounded w-full">

        <button type="button" id="togglePassword"
          class="absolute right-3 top-2 text-sm text-blue-700">
          Show
        </button>
      </div>

      <input type="password" id="confirmPassword"
        placeholder="Confirm Password"
        class="border px-4 py-2 rounded">

      <button type="submit"
        class="bg-blue-900 text-white px-4 py-2 rounded hover:bg-blue-700">
        Sign Up
      </button>

    </form>

    <p id="message" class="text-center mt-4"></p>

    <p class="text-center mt-4 text-sm">
      Already have an account?
      <a href="login.html" class="text-blue-700 font-semibold">Login</a>
    </p>

  </div>

</section>

<footer class="bg-blue-950 text-white text-center py-6">
  <p>© 2026 BudgetPro</p>
</footer>

<script>
const form = document.getElementById("signupForm");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const message = document.getElementById("message");
const togglePassword = document.getElementById("togglePassword");

togglePassword.addEventListener("click", function() {
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    togglePassword.innerText = "Hide";
  } else {
    passwordInput.type = "password";
    togglePassword.innerText = "Show";
  }
});

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  const confirm = confirmPassword.value.trim();

  if (name === "" || email === "" || password === "" || confirm === "") {
    message.textContent = "Please fill in all fields!";
    message.className = "text-red-500 text-center mt-4";
    return;
  }

  if (!email.includes("@")) {
    message.textContent = "Enter a valid email!";
    message.className = "text-red-500 text-center mt-4";
    return;
  }

  if (password.length < 6) {
    message.textContent = "Password must be at least 6 characters!";
    message.className = "text-red-500 text-center mt-4";
    return;
  }

  if (password !== confirm) {
    message.textContent = "Passwords do not match!";
    message.className = "text-red-500 text-center mt-4";
    return;
  }

  message.textContent = "Account created successfully!";
  message.className = "text-green-600 text-center mt-4";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);

});

</script>

</body>
</html>
