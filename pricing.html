<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plans & Prices - BudgetPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800">

<nav class="flex justify-between items-center px-8 py-4 bg-blue-900 text-white">
  <h1 class="text-2xl font-bold">BudgetPro</h1>

  <ul class="flex gap-6 items-center">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="how-it-works.html">How It Works</a></li>
    <li><a href="pricing.html" class="text-blue-300">Plans & Prices</a></li>
    <li><a href="learn.html">Learn</a></li>
    <li><a href="contact.html">Contact Us</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</nav>

<section class="bg-blue-900 text-white text-center py-16">
  <h1 class="text-4xl font-bold mb-4">Plans & Pricing</h1>
  <p>Choose what works for you</p>
</section>

<section class="py-12 px-8 md:px-20">
  <div class="grid md:grid-cols-3 gap-8">

    <div class="plan-card p-6 shadow-lg rounded-lg text-center">
      <h2 class="text-2xl font-bold text-blue-900 mb-2">Free Plan</h2>
      <p class="text-3xl mb-4">KES 0</p>
      <button class="choose-btn bg-blue-900 text-white px-4 py-2 rounded hover:bg-blue-700">
        Choose
      </button>
    </div>

    <div class="plan-card p-6 shadow-lg rounded-lg text-center">
      <h2 class="text-2xl font-bold text-blue-900 mb-2">Standard Plan</h2>
      <p class="text-3xl mb-4">KES 500/month</p>
      <button class="choose-btn bg-blue-900 text-white px-4 py-2 rounded hover:bg-blue-700">
        Choose
      </button>
    </div>

    <div class="plan-card p-6 shadow-lg rounded-lg text-center">
      <h2 class="text-2xl font-bold text-blue-900 mb-2">Premium Plan</h2>
      <p class="text-3xl mb-4">KES 1000/month</p>
      <button class="choose-btn bg-blue-900 text-white px-4 py-2 rounded hover:bg-blue-700">
        Choose
      </button>
    </div>

  </div>
</section>

<footer class="bg-blue-950 text-white text-center py-6">
  <p>© 2026 BudgetPro</p>
</footer>

<script>

document.addEventListener("DOMContentLoaded", function () {

  const buttons = document.querySelectorAll(".choose-btn");

  buttons.forEach(button => {
    button.addEventListener("click", function () {

      const card = this.closest(".plan-card");
      const planName = card.querySelector("h2").innerText;

      document.querySelectorAll(".plan-card").forEach(c => {
        c.classList.remove("border-4", "border-blue-900");
      });

      card.classList.add("border-4", "border-blue-900");

      alert("You selected: " + planName);

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);

    });
  });

});

</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const buttons = document.querySelectorAll(".plan-card button");

  buttons.forEach(button => {
    button.addEventListener("click", function () {

      const card = this.closest(".plan-card");
      const planName = card.querySelector("h2").innerText;

      document.querySelectorAll(".plan-card").forEach(c => {
        c.classList.remove("border-4", "border-blue-900");
      });

      card.classList.add("border-4", "border-blue-900");

      alert("You selected: " + planName);
      
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);

    });
  });

});
</script>

</body>
</html>
